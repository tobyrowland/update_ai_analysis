name: Moltbook Post

on:
  workflow_dispatch:
    inputs:
      submolt:
        description: "Submolt name (e.g. product, agents, ai)"
        required: true
        default: "product"
      title:
        description: "Post title"
        required: true
      content:
        description: "Post body (markdown). Newlines supported."
        required: true

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

      - name: Publish to Moltbook
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          BODY: ${{ inputs.content }}
        run: |
          printf '%s' "$BODY" | python moltbook_post.py \
            --submolt "${{ inputs.submolt }}" \
            --title "${{ inputs.title }}"
