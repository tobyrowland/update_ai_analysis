name: Get TV data and score

# RETIRED (companies retirement): scored/ranked into the companies table, now
# superseded by the Level 0 screener (deterministic score off screen_facts_mv).
# Scheduled run disabled; manual dispatch kept for archival only.
on:
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Score and rank AI Analysis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python score_ai_analysis.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true  # GitHub artifact-service outages must not red-flag a clean run
        with:
          name: score-ai-analysis-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
