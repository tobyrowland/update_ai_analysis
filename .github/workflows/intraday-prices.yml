name: Intraday 15-min prices

# PAUSED — EOD-first price policy. securities.price is now maintained for the
# WHOLE Tier-1 universe by prices_daily_updater (daily EOD close), so the 15-min
# intraday overlay (liquid subset only) isn't needed right now. The scheduled
# run is disabled; manual dispatch stays. Re-enable by restoring the schedule:
#   schedule:
#     - cron: "*/15 13-22 * * 1-5"   # every 15 min, 13:00–22:00 UTC, Mon–Fri
on:
  workflow_dispatch:

jobs:
  intraday-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch intraday prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python intraday_prices.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true  # GitHub artifact-service outages must not red-flag a clean run
        with:
          name: intraday-prices-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
