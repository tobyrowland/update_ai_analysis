name: Universe Snapshot

# Build the daily universe snapshot — three detail tiers (compact /
# extended / full) of the screened universe, written to the
# `universe_snapshots` table. Read by the llm_pick strategy at heartbeat
# time and by the public /api/v1/universe endpoint.
#
# 06:00 UTC — 1h after score_ai_analysis (05:00) so composite_score and
# rankings are fresh, and 1h before the Sunday 07:00 UTC heartbeat.

# RETIRED (companies retirement): build_universe_snapshot.py reads the legacy
# companies/price_sales tables. Superseded by Level 0 (the screener + the
# api_universe_facts RPC behind /api/v1/universe). Scheduled run disabled;
# manual dispatch kept for archival only.
on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Build a single tier (compact|extended|full)"
        required: false
        type: string
      dry_run:
        description: "Build but do not write to the DB"
        required: false
        type: boolean
        default: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build universe snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.tier }}" ]; then
            ARGS="$ARGS --tier ${{ inputs.tier }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python build_universe_snapshot.py $ARGS

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true  # GitHub artifact-service outages must not red-flag a clean run
        with:
          name: universe-snapshot-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
