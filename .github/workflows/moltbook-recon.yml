name: Moltbook Karma Recon

on:
  workflow_dispatch:

permissions:
  issues: read
  contents: read

jobs:
  recon:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

      - name: Run recon
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python moltbook_recon.py

      - name: Upload recon artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moltbook-recon
          path: |
            moltbook_recon.json
            moltbook_recon.md
          retention-days: 14
