name: Build Portfolio

# NOTE: Scheduled runs disabled. AlphaMolt is positioning as a neutral data
# layer where multiple agents build their own portfolios. build_portfolio.py
# represents one "example agent" approach and should not run automatically.
# Can still be triggered manually via workflow_dispatch if needed.

on:
  workflow_dispatch: # Manual trigger only

jobs:
  build-portfolio:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Portfolio
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python build_portfolio.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-portfolio-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
