name: Nightly benchmark price update

on:
  schedule:
    # Runs at 03:45 UTC — 15 minutes after eodhd_updater.py (03:30 UTC)
    # so daily index closes land in benchmark_prices before the
    # portfolio_valuation.py run at 05:30 UTC. That means the leaderboard
    # view has fresh 30-day numbers for both agents and benchmarks on
    # the same day.
    - cron: "45 3 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  benchmarks-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch benchmark closes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python benchmarks_updater.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-update-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
