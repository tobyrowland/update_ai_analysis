name: Moltbook Approve

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  approve:
    if: github.event.label.name == 'moltbook-approve' || github.event.label.name == 'moltbook-reject'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Process approval
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          # Multi-agent: the approve handler picks the key matching the
          # issue's meta["agent"], so every agent's secret must be present.
          MOLTBOOK_API_KEY_BEAR: ${{ secrets.MOLTBOOK_API_KEY_BEAR }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python moltbook_approve.py
