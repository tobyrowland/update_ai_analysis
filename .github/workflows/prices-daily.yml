name: Level 0 Prices Daily

# Daily EOD price layer for the Tier 1 set (spec §3 — the "prices" clock).
# Writes the latest trading day for every Tier 1 ticker and backfills 5y of
# history for any newly-promoted name (enough for the 200-week MA the
# ma_sniper strategy reads). Runs 04:15 UTC, after the weekly gate has
# settled and alongside the other daily fundamentals jobs.

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Force full 5y backfill for ALL Tier 1 (not just new names)"
        type: boolean
        default: false
      dry_run:
        description: "Compute but write nothing"
        type: boolean
        default: false

jobs:
  prices:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Prices Daily Updater
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            ARGS="$ARGS --backfill"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python prices_daily_updater.py $ARGS

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: prices-daily-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
