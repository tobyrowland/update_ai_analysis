name: Nightly TradingView Screen

# RETIRED (companies retirement): the legacy TradingView screen wrote the
# companies table, now superseded by Level 0 (universe_sync + the screener).
# Scheduled run disabled; manual dispatch kept for archival/debugging only.
on:
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run nightly TradingView screen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python nightly_screen.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true  # GitHub artifact-service outages must not red-flag a clean run
        with:
          name: nightly-screen-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
