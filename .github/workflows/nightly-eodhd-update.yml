name: EODHD Update

# RETIRED (companies retirement): wrote companies fundamentals, now superseded
# by Level 0 (the fundamentals table). Scheduled run disabled; manual only.
on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force update all tickers (ignore staleness check)"
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EODHD Updater
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          python eodhd_updater.py $ARGS

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true  # GitHub artifact-service outages must not red-flag a clean run
        with:
          name: eodhd-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
