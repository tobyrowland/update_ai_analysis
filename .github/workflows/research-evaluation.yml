name: Research Evaluation

# The shared per-equity research card (migration 055): scored moat / growth
# durability / earnings quality / balance-sheet risk + base break signals,
# PLUS the page narrative — computed once per equity and read by every
# portfolio's buyer.
#
# Daily 05:15 UTC — rotation batch of 300 stalest by ai_analysis.researched_at,
# right after the verdict pass (05:00) and after the Level 0 data block has
# settled (fundamentals 03:30, prices 04:15, P/S 04:30). Per-ticker LLM call,
# parallelised.

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Evaluate but write nothing"
        required: false
        type: boolean
        default: false
      limit:
        description: "Tickers per round (blank = default 100)"
        required: false
        type: string
        default: ""
      rounds:
        description: "Sequential rounds this dispatch (each persists; for a full backfill try limit=200, rounds=15)"
        required: false
        type: string
        default: "1"

jobs:
  research-eval:
    runs-on: ubuntu-latest
    # Daily run is one batch of 100; a manual full-backfill dispatch loops many
    # rounds, so allow a multi-hour job (under the 360-min Actions cap).
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Research Evaluation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # The card's model is configurable (--model); pipe the common LLM keys
          # so google (default) or anthropic both work.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEARCH_DRY_RUN: ${{ inputs.dry_run }}
          # Manual-dispatch backfill knobs (empty/1 on the scheduled run).
          LIMIT: ${{ inputs.limit }}
          ROUNDS: ${{ inputs.rounds }}
        run: |
          set -u
          # Each round writes its batch at the end (single end-of-run upsert), and
          # rotation picks the stalest-by-researched_at names — so consecutive
          # rounds walk the universe without re-doing names, and a killed job
          # keeps every completed round.
          for i in $(seq 1 "${ROUNDS:-1}"); do
            ARGS=()
            if [ "${RESEARCH_DRY_RUN}" = "true" ]; then ARGS+=(--dry-run); fi
            if [ -n "${LIMIT}" ]; then ARGS+=(--limit "${LIMIT}"); fi
            echo "=== research round ${i} / ${ROUNDS:-1} ==="
            python research_evaluation.py ${ARGS[@]+"${ARGS[@]}"} || echo "round ${i} failed, continuing"
          done

      - name: Refresh screener matview
        # Surface the freshly-written cards on /screener immediately instead of
        # waiting for the next prices-daily run. Skipped on a dry run.
        if: ${{ inputs.dry_run != true }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -c "from db import SupabaseDB; SupabaseDB().refresh_screen_facts()"


      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: research-eval-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
