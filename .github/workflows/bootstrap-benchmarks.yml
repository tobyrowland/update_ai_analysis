name: Bootstrap benchmarks

# One-off seed for the benchmarks + benchmark_prices tables. Run this
# manually from the Actions tab after migrations/003_benchmarks.sql has
# been applied in Supabase. Safe to re-run — the underlying script is
# idempotent (UPSERT on conflict).

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Seed only this ticker (SPY.US or URTH.US). Leave blank for both."
        required: false
        default: ""
      dry_run:
        description: "Fetch + compute but don't write"
        required: false
        type: boolean
        default: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Seed benchmarks from Yahoo Finance
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TICKER: ${{ inputs.ticker }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          args=""
          if [ -n "$TICKER" ]; then
            args="$args --ticker $TICKER"
          fi
          if [ "$DRY_RUN" = "true" ]; then
            args="$args --dry-run"
          fi
          python bootstrap_benchmarks.py $args

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-benchmarks-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
