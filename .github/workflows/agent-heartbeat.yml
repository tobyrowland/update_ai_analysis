name: Agent Heartbeat

# Daily rebalance loop. Every agent row with a non-null `strategy` and a
# due `last_heartbeat_at` gets its portfolio re-evaluated against its
# strategy (see agent_strategies.STRATEGIES). Each agent / portfolio member
# only rebalances when its own `heartbeat_interval_hours` cadence is due, so
# most daily runs are cheap no-op skips — a daily curator and a weekly buyer
# coexist in one portfolio (migration 029).
#
# 07:00 UTC daily — runs at the end of the morning data block, after every
# Level 0 input the swarm depends on has refreshed (prices, fundamentals,
# valuation/P-S, the verdict + research AI passes).

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      handle:
        description: "Run only this agent handle (optional)"
        required: false
        type: string
      portfolio:
        description: "Run only this portfolio (id or slug, optional)"
        required: false
        type: string
      dry_run:
        description: "Plan trades but execute none"
        required: false
        type: boolean
        default: false
      force:
        description: "Ignore heartbeat_interval_hours and run now"
        required: false
        type: boolean
        default: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    # Bumped from 15m. The llm_pick strategy can run 4+ LLM agents
    # × 2 stages × ~30s API calls; deterministic strategies finish in
    # seconds. 30m gives comfortable headroom for slow providers.
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent heartbeat
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # LLM provider keys for the llm_pick strategy. Each agent's
          # agents.config.provider selects which one is used; the others
          # stay unread for that agent. Missing keys raise LLMProviderError
          # only for agents that actually need them.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          # SerpAPI — the LLM buyer enriches each candidate with a per-name
          # "recent developments" web search at buy time (entry timing /
          # catalyst / risk). Unset => the buyer simply skips the search.
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          # Alpaca — a live portfolio mirrors its paper sibling onto a real
          # account right after rebalancing (alpaca_mirror via
          # _mirror_live_sibling). Real orders only fire when
          # ALPACA_LIVE_EXECUTION_ENABLED is truthy AND mode='live'; otherwise
          # the swarm stays paper. ALPACA_BASE_URL empty => paper sandbox;
          # ALPACA_PRICE_BAND_PCT empty => 3% slippage cap.
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          ALPACA_LIVE_EXECUTION_ENABLED: ${{ secrets.ALPACA_LIVE_EXECUTION_ENABLED }}
          ALPACA_PRICE_BAND_PCT: ${{ secrets.ALPACA_PRICE_BAND_PCT }}
          # Workflow-dispatch inputs piped via env so values with
          # whitespace / shell metacharacters can't break the arg list.
          # On scheduled runs these are empty strings — flags below skip.
          HEARTBEAT_HANDLE: ${{ inputs.handle }}
          HEARTBEAT_PORTFOLIO: ${{ inputs.portfolio }}
          HEARTBEAT_DRY_RUN: ${{ inputs.dry_run }}
          HEARTBEAT_FORCE: ${{ inputs.force }}
          # Manual (workflow_dispatch) runs always tag the journal so the
          # /account "Run now" UI can distinguish them from scheduled runs.
          HEARTBEAT_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -u
          echo "DEBUG: raw HEARTBEAT_HANDLE='${HEARTBEAT_HANDLE}' (length=${#HEARTBEAT_HANDLE})"
          echo "DEBUG: raw HEARTBEAT_PORTFOLIO='${HEARTBEAT_PORTFOLIO}'"
          echo "DEBUG: raw HEARTBEAT_DRY_RUN='${HEARTBEAT_DRY_RUN}'"
          echo "DEBUG: raw HEARTBEAT_FORCE='${HEARTBEAT_FORCE}'"
          echo "DEBUG: raw HEARTBEAT_MANUAL='${HEARTBEAT_MANUAL}'"
          ARGS=()
          # Trim whitespace so a stray space-only value doesn't add an
          # empty --handle arg.
          HANDLE="$(printf '%s' "${HEARTBEAT_HANDLE}" | tr -d '[:space:]')"
          if [ -n "${HANDLE}" ]; then
            ARGS+=(--handle "${HANDLE}")
          fi
          PORTFOLIO="$(printf '%s' "${HEARTBEAT_PORTFOLIO}" | tr -d '[:space:]')"
          if [ -n "${PORTFOLIO}" ]; then
            ARGS+=(--portfolio "${PORTFOLIO}")
          fi
          if [ "${HEARTBEAT_DRY_RUN}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ "${HEARTBEAT_FORCE}" = "true" ]; then
            ARGS+=(--force)
          fi
          if [ "${HEARTBEAT_MANUAL}" = "true" ]; then
            ARGS+=(--manual)
          fi
          echo "DEBUG: argv = python agent_heartbeat.py ${ARGS[@]+"${ARGS[@]}"}"
          python agent_heartbeat.py ${ARGS[@]+"${ARGS[@]}"}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true  # GitHub artifact-service outages must not red-flag a clean run
        with:
          name: agent-heartbeat-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
