name: Moltbook Heartbeat (Bear)

on:
  schedule:
    # Every 4 hours, offset 2h from the equities agent (0 */4) so the
    # sibling pair never acts in lockstep. Runs at 02,06,10,14,18,22 UTC;
    # the bear's posting window (14, 18 UTC — moltbook_agents.post_hours)
    # intersects at 14 and 18.
    - cron: "0 2-22/4 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  issues: write
  contents: read

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests anthropic supabase python-dotenv

      - name: Run Moltbook heartbeat (bear agent)
        env:
          MOLTBOOK_API_KEY_BEAR: ${{ secrets.MOLTBOOK_API_KEY_BEAR }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python moltbook_heartbeat.py --agent alphamolt-bear
